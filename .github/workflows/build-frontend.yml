name: Build Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts
        working-directory: frontend

      - name: Create .env
        run: echo "VITE_DEV_AUTH=true" > .env
        working-directory: frontend

      - name: Build
        run: npx vite build
        working-directory: frontend

      - name: Commit dist
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -f frontend/dist
          git diff --staged --quiet || git commit -m "chore: rebuild frontend [skip ci]"
          git push
